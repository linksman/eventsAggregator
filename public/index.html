<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events Aggregator — Test UI</title>
<style>
  body { font-family: monospace; max-width: 760px; margin: 40px auto; padding: 0 16px; background: #111; color: #e0e0e0; }
  h2 { color: #90caf9; margin-top: 32px; }
  label { display: block; margin-top: 8px; color: #aaa; font-size: 12px; }
  input { width: 100%; box-sizing: border-box; padding: 6px 8px; background: #1e1e1e; border: 1px solid #444; color: #e0e0e0; font-family: monospace; font-size: 14px; margin-top: 2px; }
  button { margin-top: 14px; padding: 8px 18px; background: #1565c0; color: #fff; border: none; cursor: pointer; font-family: monospace; font-size: 14px; }
  button:hover { background: #1976d2; }
  pre { background: #1e1e1e; border: 1px solid #333; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 13px; min-height: 40px; margin-top: 10px; }
  .ok { color: #80cbc4; }
  .err { color: #ef9a9a; }
  hr { border-color: #333; margin: 32px 0; }
</style>
</head>
<body>
<h1>Events Aggregator — Test UI</h1>

<h2>POST /events</h2>
<label>customerId</label>
<input id="customerId" value="cust_123">
<label>endpoint</label>
<input id="endpoint" value="/v1/search">
<label>timestamp (ISO 8601)</label>
<input id="timestamp" value="">
<label>statusCode</label>
<input id="statusCode" type="number" value="200">
<label>latencyMs</label>
<input id="latencyMs" type="number" value="120">
<button onclick="postEvent()">Send Event</button>
<pre id="eventsOut">—</pre>

<hr>

<h2>GET /customers/:customerId/summary</h2>
<label>customerId</label>
<input id="summaryCustomerId" value="cust_123">
<button onclick="getSummary()">Get Summary</button>
<pre id="summaryOut">—</pre>

<script>
  document.getElementById('timestamp').value = new Date().toISOString();

  async function postEvent() {
    const body = {
      customerId: document.getElementById('customerId').value,
      endpoint:   document.getElementById('endpoint').value,
      timestamp:  document.getElementById('timestamp').value,
      statusCode: Number(document.getElementById('statusCode').value),
      latencyMs:  Number(document.getElementById('latencyMs').value),
    };
    const out = document.getElementById('eventsOut');
    try {
      const res = await fetch('/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const text = await res.text();
      let pretty;
      try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch { pretty = text; }
      out.textContent = `HTTP ${res.status}\n\n${pretty}`;
      out.className = res.ok ? 'ok' : 'err';
    } catch (e) {
      out.textContent = String(e);
      out.className = 'err';
    }
  }

  async function getSummary() {
    const id = document.getElementById('summaryCustomerId').value.trim();
    const out = document.getElementById('summaryOut');
    try {
      const res = await fetch(`/customers/${encodeURIComponent(id)}/summary`);
      const text = await res.text();
      let pretty;
      try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch { pretty = text; }
      out.textContent = `HTTP ${res.status}\n\n${pretty}`;
      out.className = res.ok ? 'ok' : 'err';
    } catch (e) {
      out.textContent = String(e);
      out.className = 'err';
    }
  }
</script>
</body>
</html>
